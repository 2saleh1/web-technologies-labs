{% extends "layouts/base.html" %}
{% load static %}
{% block title %} Book List {% endblock title %}
{% block content %}
<h1>Book List</h1>
{% if books %}
    {% for obj in books %}
        ID: {{ obj.id }}, Title: {{ obj.title }}
        <hr>
    {% endfor %}
{% else %}
    <p>No books found.</p>
{% endif %}
{% endblock content %}

{% extends "layouts/base.html" %}

{% block title %}Add New Book{% endblock %}

{% block content %}
<h1>Add New Book</h1>

{% if error %}
    <div style="background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 4px; margin-bottom: 20px;">
        <strong>Error:</strong> {{ error }}
    </div>
{% endif %}

<form method="POST" style="max-width: 500px;">
    {% csrf_token %}
    
    <div style="margin-bottom: 15px;">
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label for="author">Author:</label><br>
        <input type="text" id="author" name="author" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label for="edition">Edition:</label><br>
        <input type="number" id="edition" name="edition" value="1" min="1" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label for="price">Price ($):</label><br>
        <input type="number" id="price" name="price" value="0" min="0" step="0.01" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label for="quantity">Quantity:</label><br>
        <input type="number" id="quantity" name="quantity" value="1" min="0" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    
    <div style="margin-bottom: 20px;">
        <label for="rating">Rating (1-5):</label><br>
        <input type="number" id="rating" name="rating" value="1" min="1" max="5" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    
    <div style="display: flex; gap: 10px;">
        <button type="submit" style="padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Save Book
        </button>
        <a href="{% url 'books.lab9_part1_listbooks' %}" style="padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 4px; text-align: center;">
            Cancel
        </a>
    </div>
</form>
{% endblock %}
